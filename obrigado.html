<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado! | Axmetal</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Seu CSS customizado -->
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .countdown {
            font-size: 4.5rem;
            font-weight: 700;
            font-family: monospace;
            color: #fbbf24;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex items-center justify-center overflow-hidden">

    <div class="max-w-2xl mx-auto px-6 text-center">
        <!-- Ícone de Sucesso -->
        <div class="mb-10">
            <i class="fa-solid fa-circle-check text-amber-400 text-8xl"></i>
        </div>

        <h1 class="text-5xl md:text-6xl font-bold tracking-tighter mb-6">
            Candidatura enviada com sucesso!
        </h1>

        <p class="text-xl text-zinc-400 mb-12 max-w-md mx-auto leading-relaxed">
            Obrigado por se candidatar na Axmetal.<br>
            Nossa equipe analisará seu currículo em breve e entraremos em contato.
        </p>

        <!-- Contagem Regressiva -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-10 mb-10">
            <p class="text-zinc-400 text-lg mb-4">Você será redirecionado para a página inicial em</p>

            <div id="countdown" class="countdown">10</div>

            <p class="text-sm text-zinc-500 mt-6">
                segundos
            </p>
        </div>

        <!-- Botão manual -->
        <a href="index.html"
           class="inline-flex items-center gap-3 bg-amber-500 hover:bg-amber-600 text-black font-semibold px-10 py-5 rounded-2xl text-lg transition-all active:scale-95">
            <i class="fa-solid fa-arrow-left"></i>
            Voltar para o site agora
        </a>

        <p class="text-xs text-zinc-500 mt-16">
            © 2026 Axmetal Indústria e Comércio Ltda.
        </p>
    </div>

    <script>
        let segundos = 10;
        const countdownElement = document.getElementById('countdown');

        const timer = setInterval(() => {
            segundos--;
            countdownElement.textContent = segundos;

            if (segundos <= 0) {
                clearInterval(timer);
                window.location.href = "index.html";   // altere se sua página inicial tiver outro nome
            }
        }, 1000);
    </script>
</body>
</html>
